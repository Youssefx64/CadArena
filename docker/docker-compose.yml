version: '3.9'

services:
  cadarena-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: cadarena-app
    image: cadarena:latest
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    environment:
      PYTHONUNBUFFERED: "1"
      MPLBACKEND: Agg
      CADARENA_ENV: dev
    volumes:
      - ../backend/data:/app/backend/data
      - ../backend/output:/app/backend/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - cadarena-network
    security_opt:
      - no-new-privileges:true

networks:
  cadarena-network:
    driver: bridge
