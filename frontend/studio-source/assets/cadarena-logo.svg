<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CadArena Logo</title>
  <desc id="desc">Neon geometric compass and circuit emblem for CadArena.</desc>

  <defs>
    <linearGradient id="g1" x1="143" y1="120" x2="820" y2="854" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5FDFF"/>
      <stop offset="0.45" stop-color="#71F3FF"/>
      <stop offset="1" stop-color="#38CBEA"/>
    </linearGradient>

    <linearGradient id="g2" x1="258" y1="204" x2="757" y2="742" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FFFF"/>
      <stop offset="1" stop-color="#53E5FF"/>
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feColorMatrix in="b" type="matrix" values="0 0 0 0 0.23 0 0 0 0 0.94 0 0 0 0 1 0 0 0 1 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="wordGlow" x="-10%" y="-20%" width="120%" height="150%">
      <feGaussianBlur stdDeviation="5" result="wb"/>
      <feColorMatrix in="wb" type="matrix" values="0 0 0 0 0.17 0 0 0 0 0.86 0 0 0 0 1 0 0 0 1 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M514 154V96" stroke="url(#g1)" stroke-width="22"/>
    <circle cx="514" cy="224" r="56" stroke="url(#g1)" stroke-width="20"/>
    <circle cx="514" cy="224" r="16" fill="#6FF4FF"/>

    <path d="M216 366L422 245" stroke="url(#g2)" stroke-width="18"/>
    <path d="M206 398V558L270 594" stroke="url(#g2)" stroke-width="18"/>
    <path d="M811 367L603 246" stroke="url(#g1)" stroke-width="18"/>
    <path d="M818 399V563L754 599" stroke="url(#g1)" stroke-width="18"/>

    <path d="M467 274L326 688L356 782L518 289" stroke="url(#g2)" stroke-width="22"/>
    <path d="M562 274L705 686L674 781L513 289" stroke="url(#g1)" stroke-width="22"/>

    <path d="M352 635L509 720L668 635" stroke="url(#g1)" stroke-width="18"/>

    <path d="M614 338L744 410V566L632 632" stroke="url(#g1)" stroke-width="16"/>
    <circle cx="664" cy="390" r="11" fill="#70F4FF"/>
    <circle cx="696" cy="442" r="11" fill="#70F4FF"/>
    <circle cx="728" cy="508" r="11" fill="#70F4FF"/>
    <circle cx="608" cy="586" r="11" fill="#70F4FF"/>

    <path d="M420 469H607" stroke="url(#g2)" stroke-width="16"/>
    <path d="M513 438V500" stroke="url(#g2)" stroke-width="14"/>
  </g>

  <g filter="url(#wordGlow)">
    <text x="512" y="926" text-anchor="middle" fill="#ECFFFF" font-family="'Space Grotesk', 'Manrope', sans-serif" font-size="150" font-weight="700" letter-spacing="1">CadArena</text>
  </g>
</svg>
