<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">CadArena visual workflow</title>
  <desc id="desc">Prompt to JSON to validated DXF to browser preview workflow illustration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2f2a" />
      <stop offset="55%" stop-color="#0e3f38" />
      <stop offset="100%" stop-color="#102721" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1f1d" />
      <stop offset="100%" stop-color="#142827" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4bd7b6" />
      <stop offset="100%" stop-color="#53a4ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="780" rx="34" fill="url(#bg)" />
  <g opacity="0.24">
    <path d="M0 90h1200M0 180h1200M0 270h1200M0 360h1200M0 450h1200M0 540h1200M0 630h1200" stroke="#9ec0ff" stroke-width="1" />
    <path d="M120 0v780M240 0v780M360 0v780M480 0v780M600 0v780M720 0v780M840 0v780M960 0v780M1080 0v780" stroke="#9ec0ff" stroke-width="1" />
  </g>

  <g transform="translate(80 104)">
    <rect width="330" height="168" rx="22" fill="url(#card)" stroke="#56ddc7" stroke-opacity="0.42" />
    <text x="24" y="38" fill="#d8f8ef" font-size="20" font-family="Manrope, Arial, sans-serif" font-weight="700">Prompt Input</text>
    <text x="24" y="74" fill="#9cc4ba" font-size="16" font-family="Manrope, Arial, sans-serif">2-bedroom apartment, 120 sqm</text>
    <text x="24" y="100" fill="#9cc4ba" font-size="16" font-family="Manrope, Arial, sans-serif">maximize daylight + privacy</text>
    <text x="24" y="126" fill="#9cc4ba" font-size="16" font-family="Manrope, Arial, sans-serif">entry near service core</text>
  </g>

  <g transform="translate(448 104)">
    <rect width="300" height="248" rx="22" fill="url(#card)" stroke="#62b7ff" stroke-opacity="0.44" />
    <text x="24" y="38" fill="#e2f1ff" font-size="20" font-family="Manrope, Arial, sans-serif" font-weight="700">Structured JSON</text>
    <rect x="24" y="56" width="252" height="170" rx="14" fill="#0a1417" stroke="#376f78" stroke-opacity="0.6" />
    <text x="42" y="86" fill="#8be6cf" font-size="14" font-family="monospace">{</text>
    <text x="52" y="110" fill="#8eaecb" font-size="14" font-family="monospace">"rooms": 7,</text>
    <text x="52" y="134" fill="#8eaecb" font-size="14" font-family="monospace">"adjacency": true,</text>
    <text x="52" y="158" fill="#8eaecb" font-size="14" font-family="monospace">"target_area": 120,</text>
    <text x="52" y="182" fill="#8eaecb" font-size="14" font-family="monospace">"language": "en"</text>
    <text x="42" y="206" fill="#8be6cf" font-size="14" font-family="monospace">}</text>
  </g>

  <g transform="translate(788 104)">
    <rect width="332" height="168" rx="22" fill="url(#card)" stroke="#56ddc7" stroke-opacity="0.42" />
    <text x="24" y="38" fill="#d8f8ef" font-size="20" font-family="Manrope, Arial, sans-serif" font-weight="700">Validation Engine</text>
    <text x="24" y="76" fill="#9cc4ba" font-size="16" font-family="Manrope, Arial, sans-serif">Boundary checks</text>
    <text x="24" y="102" fill="#9cc4ba" font-size="16" font-family="Manrope, Arial, sans-serif">Circulation feasibility</text>
    <text x="24" y="128" fill="#9cc4ba" font-size="16" font-family="Manrope, Arial, sans-serif">Spacing constraints</text>
    <circle cx="286" cy="84" r="22" fill="#16372f" stroke="#5fe3c1" />
    <path d="M276 84l7 7 13-15" fill="none" stroke="#7ff0d3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <g transform="translate(80 332)">
    <rect width="498" height="314" rx="24" fill="url(#card)" stroke="#61b6ff" stroke-opacity="0.4" />
    <text x="24" y="40" fill="#e3f2ff" font-size="20" font-family="Manrope, Arial, sans-serif" font-weight="700">Browser Preview</text>
    <rect x="24" y="58" width="450" height="232" rx="14" fill="#0b1216" stroke="#355566" stroke-opacity="0.8" />
    <g transform="translate(56 88)">
      <rect width="390" height="172" fill="none" stroke="#5e8ca8" stroke-opacity="0.38" />
      <path d="M0 34h390M0 68h390M0 102h390M0 136h390" stroke="#4b6f84" stroke-opacity="0.3" />
      <path d="M78 0v172M156 0v172M234 0v172M312 0v172" stroke="#4b6f84" stroke-opacity="0.3" />
      <rect x="20" y="18" width="96" height="58" rx="8" fill="#123035" stroke="#4bd7b6" stroke-opacity="0.65" />
      <rect x="132" y="18" width="116" height="88" rx="8" fill="#142a33" stroke="#53a4ff" stroke-opacity="0.65" />
      <rect x="264" y="18" width="106" height="48" rx="8" fill="#1a2c2a" stroke="#6aeac9" stroke-opacity="0.55" />
      <rect x="20" y="92" width="88" height="56" rx="8" fill="#172d2b" stroke="#6aeac9" stroke-opacity="0.55" />
      <rect x="124" y="116" width="142" height="32" rx="8" fill="#20353a" stroke="#53a4ff" stroke-opacity="0.62" />
      <rect x="282" y="84" width="88" height="64" rx="8" fill="#12292f" stroke="#4bd7b6" stroke-opacity="0.65" />
    </g>
  </g>

  <g transform="translate(618 332)">
    <rect width="502" height="314" rx="24" fill="url(#card)" stroke="#58dfc3" stroke-opacity="0.4" />
    <text x="24" y="40" fill="#d9f9ef" font-size="20" font-family="Manrope, Arial, sans-serif" font-weight="700">DXF Export</text>
    <g transform="translate(24 62)">
      <rect width="454" height="94" rx="16" fill="#0d1617" stroke="#2f4c4c" />
      <path d="M30 26h120M30 46h78" stroke="#91b6ad" stroke-width="3" stroke-linecap="round" />
      <rect x="300" y="22" width="126" height="46" rx="12" fill="url(#accent)" filter="url(#glow)" />
      <text x="363" y="51" text-anchor="middle" fill="#03222b" font-size="16" font-family="Manrope, Arial, sans-serif" font-weight="800">Download DXF</text>
    </g>
    <g transform="translate(24 176)">
      <rect width="454" height="114" rx="16" fill="#0b1417" stroke="#355966" />
      <text x="24" y="34" fill="#d6ecf5" font-size="17" font-family="Manrope, Arial, sans-serif" font-weight="700">Project Memory</text>
      <text x="24" y="60" fill="#8fb0bd" font-size="14" font-family="Manrope, Arial, sans-serif">Prompt, validation, generated file, and notes stay linked</text>
      <text x="24" y="83" fill="#8fb0bd" font-size="14" font-family="Manrope, Arial, sans-serif">inside each workspace for clear team handoff.</text>
      <circle cx="404" cy="56" r="28" fill="#163734" stroke="#5fe3c1" stroke-opacity="0.7" />
      <path d="M390 56h28M404 42v28" stroke="#7ef1d4" stroke-width="3" stroke-linecap="round" />
    </g>
  </g>

  <g stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity="0.68">
    <path d="M410 188h36" />
    <path d="M748 188h40" />
    <path d="M578 490h40" />
  </g>
</svg>
